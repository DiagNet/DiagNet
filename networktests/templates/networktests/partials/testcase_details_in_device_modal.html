<div class="d-flex align-items-center gap-2 mb-4">
    <button class="btn btn-sm btn-outline-secondary"
            hx-get="{% url 'device-detail-partial' from_device_pk %}"
            hx-target="closest .modal-body"
            hx-swap="innerHTML">
        <i class="bi bi-arrow-left"></i> Back
    </button>
    <div>
        <div class="d-flex align-items-center gap-2">
            <span class="fw-semibold">{{ testcase.label }}</span>
            <span class="badge bg-body-tertiary text-body border fw-normal font-monospace">
                <i class="bi bi-code-square me-1"></i>{{ testcase.test_module }}
            </span>
        </div>
        {% if testcase.description %}
            <p class="text-secondary small mb-0">{{ testcase.description|truncatewords:20 }}</p>
        {% endif %}
    </div>
</div>
{% include "networktests/partials/testcase_details.html" %}
