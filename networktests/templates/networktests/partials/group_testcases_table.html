{% load datetime_helpers %}
<div class="table-responsive">
    <table class="table table-hover mb-0">
        <thead>
            <tr>
                <th>Name</th>
                <th>Test Case</th>
                <th>Last Run</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for testcase in testcases %}
                {% include "networktests/partials/testcase_row.html" with testcase=testcase %}
            {% empty %}
                <tr>
                    <td colspan="5" class="text-muted">No test cases.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
