<form hx-post="{% url 'testcase-save' testcase.pk %}"
      hx-target="closest .modal-body"
      hx-swap="innerHTML"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    {% csrf_token %}
    <div class="mb-3">
        <label for="{{ form.label.id_for_label }}" class="form-label">Name</label>
        {{ form.label }}
        {% if form.label.errors %}
            <div class="invalid-feedback d-block">
                {% for error in form.label.errors %}{{ error }}{% endfor %}
            </div>
        {% endif %}
    </div>
    <div class="mb-3">
        <label for="{{ form.description.id_for_label }}" class="form-label">Description</label>
        {{ form.description }}
        {% if form.description.errors %}
            <div class="invalid-feedback d-block">
                {% for error in form.description.errors %}{{ error }}{% endfor %}
            </div>
        {% endif %}
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <button type="button"
                class="btn btn-secondary"
                hx-get="{% url 'testcase-details' testcase.pk %}"
                hx-target="closest .modal-body"
                hx-swap="innerHTML">Cancel</button>
    </div>
</form>
