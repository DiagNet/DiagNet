<div class="modal-header">
    {% if from_device_pk %}
        <button class="btn btn-sm btn-outline-secondary me-2"
                hx-get="{% url 'device-modal-content' from_device_pk %}{% if from_testcase_pk %}?from_testcase={{ from_testcase_pk }}{% endif %}"
                hx-target="closest .modal-content"
                hx-swap="innerHTML">
            <i class="bi bi-arrow-left"></i>
        </button>
    {% endif %}
    <div>
        <div class="d-flex align-items-center gap-3 mb-1">
            <h5 class="fw-bold mb-0 text-body">{{ testcase.label }}</h5>
            <span class="badge bg-body-tertiary text-body border fw-normal font-monospace">
                <i class="bi bi-code-square me-1"></i>{{ testcase.test_module }}
            </span>
        </div>
        {% if testcase.description %}
            <p class="text-secondary small mt-1 mb-0">{{ testcase.description|truncatewords:20 }}</p>
        {% endif %}
    </div>
    <button type="button"
            class="btn-close ms-auto"
            data-bs-dismiss="modal"
            aria-label="Close"></button>
</div>
<div class="modal-body">{% include "networktests/partials/testcase_details.html" %}</div>
<div class="modal-footer">
    {% if perms.networktests.delete_testcase %}
        <button class="btn btn-danger"
                hx-delete="{% url 'testcase_delete' testcase.id %}"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-confirm="Are you sure you want to delete this test case?"
                hx-swap="none"
                hx-on::after-request="if(event.detail.successful){ bootstrap.Modal.getInstance(this.closest('.modal')).hide(); htmx.trigger(document.body,'refreshDashboard'); }"
                data-bs-dismiss="modal">
            <i class="bi bi-trash"></i> Delete
        </button>
    {% endif %}
</div>
