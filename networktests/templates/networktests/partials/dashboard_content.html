<div class="accordion" id="dashboardAccordion">
    {% for group in testgroups %}
        {% include "networktests/partials/group_accordion_item.html" with group=group %}
    {% empty %}
        <div class="text-muted mb-3">No test groups yet. Create one to get started.</div>
    {% endfor %}
    <div class="accordion-item">
        <h2 class="accordion-header" id="heading-all-tests">
            <button class="accordion-button collapsed"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#collapse-all-tests"
                    aria-expanded="false"
                    aria-controls="collapse-all-tests">
                <i class="bi bi-list-check me-2"></i>
                All Tests
                <span class="badge bg-secondary ms-2">{{ all_testcases|length }} tests</span>
            </button>
        </h2>
        <div id="collapse-all-tests"
             class="accordion-collapse collapse"
             aria-labelledby="heading-all-tests"
             data-bs-parent="#dashboardAccordion">
            <div class="accordion-body">
                <div id="all-tests-table"
                     hx-get="{% url 'all-tests-table-partial' %}"
                     hx-trigger="load, refreshAllTests from:body"
                     hx-swap="innerHTML"></div>
            </div>
        </div>
    </div>
</div>
