<div class="accordion-item" id="accordion-item-group-{{ group.pk }}">
    <h2 class="accordion-header" id="heading-group-{{ group.pk }}">
        <button class="accordion-button {% if not accordion_open %}collapsed{% endif %}"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapse-group-{{ group.pk }}"
                aria-expanded="{{ accordion_open|yesno:'true,false' }}"
                aria-controls="collapse-group-{{ group.pk }}">
            <i class="bi bi-folder me-2"></i>
            {{ group.name }}
            <span class="badge bg-secondary-subtle text-secondary-emphasis border border-secondary-subtle ms-2">{{ group.testcases.all|length }} tests</span>
        </button>
    </h2>
    <div id="collapse-group-{{ group.pk }}"
         class="accordion-collapse collapse {% if accordion_open %}show{% endif %}"
         aria-labelledby="heading-group-{{ group.pk }}"
         data-bs-parent="#dashboardAccordion">
        <div class="accordion-body">
            <div class="d-flex gap-2 mb-3">
                <button class="btn btn-sm btn-primary run-all-btn"
                        hx-post="{% url 'testgroup-run-all' group.pk %}"
                        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                        hx-target="#group-table-{{ group.pk }}"
                        hx-swap="innerHTML"
                        hx-disabled-elt="this">
                    <i class="bi bi-play-fill run-all-icon"></i>
                    <span class="spinner-border spinner-border-sm run-all-spinner d-none"
                          role="status"></span>
                    Run all tests
                </button>
                <button class="btn btn-sm btn-primary"
                        data-bs-toggle="modal"
                        data-bs-target="#comparisonModal-{{ group.pk }}">
                    <i class="bi bi-table"></i> Compare
                </button>
                <a href="{% url 'testgroup-export-pdf' group.pk %}"
                   class="btn btn-sm btn-danger">
                    <i class="bi bi-file-earmark-pdf"></i> Export PDF
                </a>
                <button class="btn btn-sm btn-secondary"
                        hx-get="{% url 'testgroup-edit-modal' group.pk %}"
                        hx-target="#testgroup-modal-container"
                        hx-swap="innerHTML">
                    <i class="bi bi-pencil"></i> Edit
                </button>
                <button class="btn btn-sm btn-danger"
                        hx-post="{% url 'testgroup-delete' group.pk %}"
                        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                        hx-swap="none"
                        hx-confirm="Are you sure you want to delete the group '{{ group.name }}'?">
                    <i class="bi bi-trash"></i> Delete
                </button>
            </div>
            <div class="modal fade" id="comparisonModal-{{ group.pk }}" tabindex="-1">
                <div class="modal-dialog modal-xl">
                    <div class="modal-content"
                         hx-get="{% url 'group-comparison-modal' group.pk %}"
                         hx-trigger="shown.bs.modal from:closest .modal once"
                         hx-swap="innerHTML">
                        <div class="modal-body text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="group-table-{{ group.pk }}"
                 hx-get="{% url 'group-table-partial' group.pk %}"
                 hx-trigger="load"
                 hx-swap="innerHTML"></div>
        </div>
    </div>
</div>
